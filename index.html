<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEM-Shose</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            font-family: 'Khmer OS Battambang', sans-serif;
            margin: 0;
            background-color: #f9f9f9;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            background: #fff;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .cart-icon {
            cursor: pointer;
            position: relative;
            font-size: 22px;
        }

        #cart-count {
            position: absolute;
            top: -10px;
            right: -10px;
            background: red;
            color: white;
            border-radius: 50%;
            padding: 2px 7px;
            font-size: 11px;
        }

        .login-btn {
            cursor: pointer;
            font-weight: bold;
            color: #333;
            text-decoration: none;
            border: 1px solid #333;
            padding: 5px 15px;
            border-radius: 20px;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: #333;
            color: #fff;
        }

        /* Login Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            position: relative;
            animation: fadeIn 0.3s;
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .btn-login-submit {
            width: 100%;
            background: #007bff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            cursor: pointer;
            font-size: 20px;
            color: #999;
        }

        /* Product Grid & Sidebar (ដូចមុន) */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .product-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .product-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 5px;
        }

        .btn-add {
            background: #222;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -400px;
            width: 350px;
            height: 100%;
            background: white;
            box-shadow: -5px 0 15px rgba(0, 0, 0, 0.2);
            transition: 0.4s;
            z-index: 1000;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .cart-sidebar.active {
            right: 0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <h2>TEM-Shose</h2>
        </div>
        <div class="nav-right">
            <span class="login-btn" onclick="openLogin()">Login</span>
            <div class="cart-icon" onclick="toggleCart()">
                <i class="fas fa-shopping-cart"></i>
                <span id="cart-count">0</span>
            </div>
        </div>
    </header>

    <div class="modal-overlay" id="loginModal">
        <div class="login-box">
            <i class="fas fa-times close-modal" onclick="closeLogin()"></i>
            <h2>Welcome! Please Login</h2>
            <form onsubmit="handleLogin(event)">
                <input type="email" placeholder="Email or Phone Number" required>
                <input type="password" placeholder="Password" required>
                <button type="submit" class="btn-login-submit">Login</button>
                <p style="text-align: center; font-size: 13px; color: #666; margin-top: 15px;">Don't have an account? <a
                        href="#">Sign Up</a></p>
            </form>
        </div>
    </div>

    <div class="container">
        <h2 style="text-align: center;">All Products</h2>
        <div class="product-grid" id="product-list">
        </div>
    </div>

    <div class="container">
        <div class="product-grid" id="product-list">
        </div>
    </div>

    <div class="cart-sidebar" id="cart-sidebar">
        <div
            style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px;">
            <h3>Shopping Cart</h3>
            <i class="fas fa-times" style="cursor:pointer" onclick="toggleCart()"></i>
        </div>
        <div id="cart-items-list" style="flex-grow:1; overflow-y:auto; margin-top:15px;"></div>
        <div style="border-top: 1px solid #eee; padding-top: 15px;">
            <div style="display:flex; justify-content:space-between; font-weight:bold; margin-bottom:15px;">
                <span>Total:</span> <span id="total-amount">$0.00</span>
            </div>
            <button
                style="width:100%; background:#28a745; color:white; border:none; padding:12px; border-radius:5px; cursor:pointer;"
                onclick="alert('Checkout!')">Proceed to Checkout</button>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "UNEED", price: 15.00, img: "L01.jpg" },
            { id: 2, name: "UNEED", price: 15.00, img: "UF01.jpg" },
            { id: 3, name: "UNEED", price: 15.00, img: "Uj01.jpg" },
            { id: 4, name: "UNEED", price: 15.50, img: "UL01.JPG" },
            { id: 5, name: "WEFA", price: 10.00, img: "WA02.png" },
            { id: 6, name: "WEFA", price: 10.00, img: "WB02.jpg" },
            { id: 7, name: "WEFA", price: 10.00, img: "WC01.jpg" },
            { id: 8, name: "WEFA", price: 10.00, img: "WD04.png" }
        ];

        let cart = [];

        function renderProducts() {
            document.getElementById('product-list').innerHTML = products.map(p => `
                <div class="product-card">
                    <img src="${p.img}">
                    <h3>${p.name}</h3>
                    <p>$${p.price.toFixed(2)}</p>
                    <button class="btn-add" onclick="addToCart(${p.id})">Add to Cart</button>
                </div>
            `).join('');
        }

        // Login Functions
        function openLogin() { document.getElementById('loginModal').style.display = 'flex'; }
        function closeLogin() { document.getElementById('loginModal').style.display = 'none'; }

        function handleLogin(e) {
            e.preventDefault();
            alert("Login successful!");
            closeLogin();
            document.querySelector('.login-btn').innerText = "My Account";
        }

        // Cart Functions
        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('active'); }

        function addToCart(id) {
            const p = products.find(x => x.id === id);
            cart.push(p);
            updateCart();
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            let total = 0;
            document.getElementById('cart-items-list').innerHTML = cart.map(item => {
                total += item.price;
                return `<div style="display:flex; gap:10px; margin-bottom:10px; border-bottom:1px solid #f9f9f9; padding-bottom:5px;">
                    <img src="${item.img}" width="40">
                    <div><div style="font-size:12px">${item.name}</div><b>$${item.price.toFixed(2)}</b></div>
                </div>`;
            }).join('');
            document.getElementById('total-amount').innerText = `$${total.toFixed(2)}`;
        }

        renderProducts();
    </script>
</body>

</html>
